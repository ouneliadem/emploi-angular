<div class="login-wrapper">
  <div class="login-container">
    <div class="login-header">
      <h2>Welcome Back</h2>
      <p>Discover your next travel job</p>
    </div>

    <form
      #loginForm="ngForm"
      (ngSubmit)="onSubmit(loginForm)"
      class="login-form"
    >
      <div class="input-group">
        <label for="email">Email</label>
        <div class="input-wrapper">
          <input
            type="email"
            id="email"
            name="email"
            ngModel
            required
            email
            placeholder="hello@traveljobs.xyz"
          />
        </div>
        <span
          class="error-msg"
          *ngIf="
            loginForm.controls['email']?.invalid &&
            loginForm.controls['email']?.touched
          "
        >
          Please enter a valid email address.
        </span>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input
            type="password"
            id="password"
            name="password"
            ngModel
            required
            placeholder="••••••••"
          />
        </div>
        <span
          class="error-msg"
          *ngIf="
            loginForm.controls['password']?.invalid &&
            loginForm.controls['password']?.touched
          "
        >
          Password is required.
        </span>
      </div>

      <div class="form-actions">
        <div class="remember-me">
          <input type="checkbox" id="rememberMe" name="rememberMe" ngModel />
          <label for="rememberMe">Remember me</label>
        </div>
        <a href="#" class="forgot-password">Forgot password?</a>
      </div>

      <button type="submit" class="submit-btn" [disabled]="loginForm.invalid">
        Sign In
      </button>

      <p class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</p>

      <p class="signup-link">
        New here? <a routerLink="/auth/register">Create an account</a>
      </p>
    </form>
  </div>
</div>
