<div class="job-list-container">
  <div class="list-header">
    <h3>Recommended Jobs</h3>
    <span class="badge">{{ events.length }} total</span>
  </div>
  <p class="error-text" *ngIf="errorMessage">{{ errorMessage }}</p>

  <div class="jobs-wrapper">
    <div class="job-card" *ngFor="let event of events">
      <div class="job-card-header">
        <div
          class="company-logo"
          style="background: linear-gradient(135deg, #10b981, #059669)"
        >
          {{ event.title.charAt(0) }}
        </div>
        <div class="job-info">
          <h4>{{ event.title }}</h4>
          <p class="company-name">
            {{ event.description || "N/A" }} •
            <span class="location">{{ event.location }}</span>
          </p>
        </div>
        <button class="apply-btn" (click)="deleteEvent(event._id)">
          Delete
        </button>
      </div>
      <div class="job-tags">
        <span class="tag">{{ event.date | date: "mediumDate" }}</span>
        <span class="tag">Backend API</span>
      </div>
    </div>
  </div>
</div>
