<div class="card">
  <h3>Nouvelle Inscription</h3>
  <form
    [formGroup]="participationForm"
    (ngSubmit)="onSubmit()"
    class="mt-6 flex flex-col gap-4"
  >
    <div class="form-group">
      <label for="userId">Sélectionner un Utilisateur</label>
      <select id="userId" formControlName="userId">
        <option value="" disabled>-- Choisir un utilisateur --</option>
        <option *ngFor="let user of users" [value]="user._id">
          {{ user.name }}
        </option>
      </select>
      <span
        class="error-text"
        *ngIf="
          participationForm.get('userId')?.invalid &&
          participationForm.get('userId')?.touched
        "
      >
        Veuillez sélectionner un utilisateur.
      </span>
    </div>

    <div class="form-group">
      <label for="eventId">Sélectionner un Événement</label>
      <select id="eventId" formControlName="eventId">
        <option value="" disabled>-- Choisir un événement --</option>
        <option *ngFor="let event of events" [value]="event._id">
          {{ event.title }} ({{ event.date | date: "mediumDate" }})
        </option>
      </select>
      <span
        class="error-text"
        *ngIf="
          participationForm.get('eventId')?.invalid &&
          participationForm.get('eventId')?.touched
        "
      >
        Veuillez sélectionner un événement.
      </span>
    </div>

    <div class="form-group">
      <label for="statut">Statut de la participation</label>
      <select id="statut" formControlName="statut">
        <option *ngFor="let status of statuses" [value]="status.value">
          {{ status.label }}
        </option>
      </select>
    </div>

    <button type="submit" class="btn btn-primary" style="margin-top: 1rem">
      Confirmer l'inscription
    </button>
    <span class="error-text" *ngIf="errorMessage">{{ errorMessage }}</span>
    <span class="error-text" style="color: var(--success)" *ngIf="message">{{
      message
    }}</span>
  </form>
</div>
